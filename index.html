<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="Belajar GitHub dari nol sampai mahir. Panduan lengkap berbahasa Indonesia dengan analogi sederhana dan contoh kontekstual.">
  <meta name="color-scheme" content="dark light">

  <!-- Open Graph -->
  <meta property="og:title" content="LearnGithub - Belajar GitHub dari Nol Sampai Mahir">
  <meta property="og:description" content="Panduan lengkap berbahasa Indonesia dengan analogi sederhana dan contoh kontekstual.">
  <meta property="og:type" content="website">

  <title>LearnGithub - Belajar GitHub dari Nol Sampai Mahir</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%2358a6ff'/><text x='50' y='68' font-size='56' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700'>G</text></svg>">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- App Layout -->
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Navigasi modul">
      <div class="sidebar-header">
        <a href="#" class="sidebar-brand" onclick="App.navigateTo('welcome'); return false;">
          <div class="sidebar-brand-icon">G</div>
          <span class="sidebar-brand-text">LearnGithub</span>
        </a>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Populated by JS -->
      </nav>

      <div class="sidebar-footer">
        <div class="progress-label">
          <span>Progress</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
    </aside>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="App.closeSidebar()"></div>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper">

      <!-- Topbar -->
      <header class="topbar" role="banner">
        <button class="topbar-hamburger" id="hamburgerBtn" onclick="App.toggleSidebar()" aria-label="Buka menu navigasi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="topbar-title" id="topbarTitle">
          <strong>LearnGithub</strong>
        </div>

        <div class="topbar-actions">
          <button class="theme-toggle" id="themeToggle" onclick="App.toggleTheme()" aria-label="Ganti tema">
            <!-- Moon icon (dark mode) -->
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <!-- Sun icon (light mode) -->
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <main class="content-area" role="main">
        <div class="content-inner" id="contentArea">
          <!-- Populated by JS -->
        </div>
      </main>

    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
